<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hilt" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#8b8f96"/>
      <stop offset="0.5" stop-color="#c9cdd3"/>
      <stop offset="1" stop-color="#7c8088"/>
    </linearGradient>
  </defs>
  <!-- lame : du manche (bas-gauche) vers la pointe (haut-droite), bleu lumineux -->
  <g filter="url(#glow)" stroke-linecap="round" fill="none">
    <line x1="34" y1="66" x2="86" y2="12" stroke="#3a5bff" stroke-width="11" opacity="0.55"/>
    <line x1="35" y1="65" x2="85" y2="13" stroke="#6f8bff" stroke-width="6.5"/>
    <line x1="36" y1="64" x2="84" y2="14" stroke="#eaf0ff" stroke-width="2.6"/>
  </g>
  <!-- manche : deux segments gris + bouton rouge -->
  <g stroke="#1c1f24" stroke-width="2.4" stroke-linejoin="round">
    <rect x="24.5" y="55" width="20" height="15" rx="2.4"
          transform="rotate(-46 34.5 62.5)" fill="url(#hilt)"/>
    <rect x="12" y="64" width="22" height="17" rx="2.6"
          transform="rotate(-46 23 72.5)" fill="url(#hilt)"/>
    <circle cx="32" cy="64.5" r="3.1" fill="#ff2323" stroke="#7a0000" stroke-width="1.4"/>
  </g>
</svg>
